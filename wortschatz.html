<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wortschatz — Moin, Deutsch!</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Poppins',-apple-system,'Segoe UI',Roboto,sans-serif;background:#F4F6F5;color:#111111;min-height:100vh}
.hidden{display:none!important}
.app{max-width:620px;margin:0 auto;padding:28px 20px 60px}

.top{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:22px}
.eyebrow{font-size:11px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:#0A7A52;margin-bottom:2px}
h1{font-size:26px;font-weight:700;letter-spacing:-.01em;line-height:1.1}
.stats{text-align:right;font-size:13px;color:#666666;padding-bottom:3px}
.stats b{color:#111111;font-weight:600}

.tabs{display:flex;background:#E9ECEA;border-radius:14px;padding:4px;gap:4px;margin-bottom:26px}
.tab{flex:1;border:0;background:transparent;border-radius:10px;height:40px;font:inherit;font-size:14px;font-weight:500;color:#666666;cursor:pointer;transition:all .15s}
.tab.active{background:#fff;color:#111111;font-weight:600;box-shadow:0 1px 4px rgba(17,17,17,.08)}

.progress{height:5px;background:#E6E9E7;border-radius:99px;margin-bottom:18px;overflow:hidden}
#study-bar{height:100%;width:0;background:#0A7A52;border-radius:99px;transition:width .3s}

.topics{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:18px}
.tchip{border:1.5px solid #E4E7E5;background:#fff;color:#9A9A9A;border-radius:999px;padding:7px 14px 7px 10px;font:inherit;font-size:13px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:7px;transition:all .13s}
.tchip:hover{border-color:#C9CFCB}
.tchip .tick{width:16px;height:16px;border-radius:50%;border:1.5px solid #C9CFCB;display:inline-flex;align-items:center;justify-content:center;flex:none}
.tchip .tc{font-weight:500;font-size:12px;opacity:.7}
.tchip.on{border-color:#0A7A52;background:#E3F2EB;color:#0A7A52}
.tchip.on .tick{background:#0A7A52;border-color:#0A7A52}

#stage{perspective:1200px;margin-bottom:16px}
.card{position:relative;height:340px;cursor:pointer}
.card-inner{position:absolute;inset:0;transform-style:preserve-3d;transition:transform .55s cubic-bezier(.2,.75,.25,1)}
.card.flipped .card-inner{transform:rotateY(180deg)}
.face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;background:#fff;border:1px solid #E4E7E5;border-radius:22px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:36px 30px;box-shadow:0 10px 30px rgba(17,40,30,.06)}
.face.back{transform:rotateY(180deg)}

.term{font-size:38px;font-weight:600;text-align:center;letter-spacing:-.01em;word-break:break-word;line-height:1.15}
.term.long{font-size:29px}
.term.xlong{font-size:22px;line-height:1.3}
.term span{font-weight:500}
.dots{display:flex;gap:6px}
.face .dots{position:absolute;bottom:20px}
.dot{width:7px;height:7px;border-radius:50%;background:#E0E4E1}
.dot.on{background:#0A7A52}

.term-sm{font-size:15px;font-weight:600;color:#666666;margin-bottom:10px}
.art-der-t{color:#1A3C8A}.art-die-t{color:#C43020}.art-das-t{color:#0A7A52}
.trans{font-size:27px;font-weight:600;text-align:center;margin-bottom:14px;letter-spacing:-.01em;line-height:1.2}
.trans.long{font-size:21px;line-height:1.3}
.ex{font-size:15.5px;font-style:italic;color:#555555;text-align:center;line-height:1.55;max-width:420px}
.note{margin-top:16px;font-size:12.5px;color:#0A7A52;background:#E3F2EB;padding:6px 13px;border-radius:999px;font-weight:500;text-align:center}
.counter{text-align:center;font-size:12.5px;color:#9A9A9A;margin-top:12px}

.btn{border:0;font:inherit;font-weight:600;font-size:15.5px;border-radius:15px;height:54px;cursor:pointer;transition:transform .12s,background .15s,border-color .15s}
.btn:active{transform:scale(.985)}
.grade{display:flex;gap:12px}
.grade .btn{flex:1}
.again{background:#F9E7E4;color:#C43020}
.again:hover{background:#F5DCD7}
.knew{background:#0A7A52;color:#fff;padding:0 26px}
.knew:hover{background:#086A47}
.ghost{width:100%;background:#fff;border:1px solid #E4E7E5;color:#333333}
.ghost:hover{border-color:#C9CFCB}
#study-actions{min-height:54px}

.state{background:#fff;border:1px solid #E4E7E5;border-radius:22px;padding:52px 30px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:10px}
.state-h{font-size:21px;font-weight:600}
.state-p{font-size:14.5px;color:#666666;margin-bottom:10px;line-height:1.6}
.state svg{margin-bottom:4px}

.list-head{display:flex;gap:12px;align-items:center;margin-bottom:14px}
#search{flex:1;height:46px;border:1px solid #E4E7E5;border-radius:13px;padding:0 16px;font:inherit;font-size:14.5px;background:#fff;outline:none;transition:border .15s,box-shadow .15s}
#search:focus{border-color:#0A7A52;box-shadow:0 0 0 3px rgba(10,122,82,.12)}
#count-label{font-size:13px;color:#9A9A9A;white-space:nowrap}
.row{display:flex;align-items:center;gap:12px;background:#fff;border:1px solid #E4E7E5;border-radius:15px;padding:13px 15px;margin-bottom:9px}
.gdot{width:9px;height:9px;border-radius:50%;flex:none}
.g-der{background:#1A3C8A}.g-die{background:#C43020}.g-das{background:#0A7A52}.g-none{background:#C9CFCB}
.row-main{flex:1;min-width:0;cursor:pointer}
.row-de{font-weight:600;font-size:15px}
.row-en{font-size:13px;color:#777777;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.row-topic{color:#B0B5B1}
.dots.small .dot{width:5.5px;height:5.5px}
.icon-btn{border:0;background:transparent;color:#B4B9B5;cursor:pointer;padding:7px;border-radius:9px;display:flex;align-items:center;font:inherit;transition:all .13s}
.icon-btn:hover{background:#F2F4F3;color:#C43020}
.icon-btn.armed{background:#F9E7E4;color:#C43020;font-size:12px;font-weight:600;padding:7px 10px}
.empty-list{text-align:center;color:#9A9A9A;font-size:14px;padding:36px 0}

.form{background:#fff;border:1px solid #E4E7E5;border-radius:22px;padding:26px 24px}
.form h2{font-size:18px;font-weight:600;margin-bottom:20px}
.field{margin-bottom:16px}
label{display:block;font-size:11.5px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:#8A8F8B;margin-bottom:7px}
.input{width:100%;height:50px;border:1px solid #E4E7E5;border-radius:13px;padding:0 15px;font:inherit;font-size:15px;outline:none;background:#FBFCFB;transition:border .15s,box-shadow .15s}
.input:focus{border-color:#0A7A52;box-shadow:0 0 0 3px rgba(10,122,82,.12);background:#fff}
.art-row{display:flex;gap:8px}
.art-opt{flex:1;height:44px;border:1.5px solid #E4E7E5;background:#fff;border-radius:12px;font:inherit;font-size:14px;font-weight:600;color:#9A9A9A;cursor:pointer;transition:all .13s}
.art-opt.sel[data-a='']{border-color:#666666;color:#333333;background:#F2F4F3}
.art-opt.sel[data-a='der']{border-color:#1A3C8A;color:#1A3C8A;background:#E7ECF7}
.art-opt.sel[data-a='die']{border-color:#C43020;color:#C43020;background:#F9E7E4}
.art-opt.sel[data-a='das']{border-color:#0A7A52;color:#0A7A52;background:#E3F2EB}
.art-opt.auto{display:inline-flex;align-items:center;justify-content:center;gap:5px;color:#0A7A52;border-style:dashed;border-color:#BFE0D2}
.art-opt.auto:hover{background:#E3F2EB;border-color:#0A7A52}
.art-opt.auto:disabled{opacity:.55;cursor:wait}
.ai-fill{width:100%;background:#fff;border:1.5px dashed #BFE0D2;color:#0A7A52;display:inline-flex;align-items:center;justify-content:center;gap:7px;height:50px;font-size:14.5px;margin-top:4px}
.ai-fill:hover{background:#E3F2EB;border-color:#0A7A52}
.ai-fill:disabled{opacity:.55;cursor:wait}
.form-actions{display:flex;gap:10px;margin-top:22px}
#btn-save{flex:1}
#btn-cancel{padding:0 22px;background:#F2F4F3;color:#555555}
.hint{font-size:12px;color:#A0A5A1;margin-top:14px;text-align:center}
.foot{margin-top:26px;text-align:center;font-size:12px;color:#B7BCB8}

#toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(14px);background:#111111;color:#fff;font-size:13.5px;font-weight:500;padding:10px 20px;border-radius:999px;opacity:0;pointer-events:none;transition:all .25s;z-index:50}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media (prefers-reduced-motion:reduce){.card-inner{transition:none}#study-bar{transition:none}}
@media (max-width:460px){
  .term{font-size:31px}
  .term.long{font-size:25px}
  .term.xlong{font-size:19px}
  .trans{font-size:23px}
  .trans.long{font-size:19px}
  .card{height:310px}
  h1{font-size:23px}
  .app{padding:22px 14px 50px}
  .art-opt{font-size:13px}
}
</style>
</head>
<body>
<div class="app">

  <div class="top">
    <div>
      <div class="eyebrow">Moin, Deutsch!</div>
      <h1>Wortschatz</h1>
    </div>
    <div class="stats"><b id="stat-total">0</b> Wörter · <b id="stat-due">0</b> fällig</div>
  </div>

  <div class="tabs">
    <button class="tab active" id="tab-study" onclick="show('study')">Lernen</button>
    <button class="tab" id="tab-list" onclick="show('list')">Wörter</button>
    <button class="tab" id="tab-add" onclick="goAdd()">+ Neu</button>
  </div>

  <section id="view-study">
    <div class="topics" id="topic-chips"></div>
    <div class="progress" id="study-progress"><div id="study-bar"></div></div>
    <div id="stage"></div>
    <div id="study-actions"></div>
  </section>

  <section id="view-list" class="hidden">
    <div class="list-head">
      <input id="search" placeholder="Suchen …" oninput="renderList()">
      <span id="count-label"></span>
    </div>
    <div id="word-list"></div>
  </section>

  <section id="view-add" class="hidden">
    <div class="form">
      <h2 id="form-title">Neues Wort</h2>
      <div class="field">
        <label>Artikel</label>
        <div class="art-row">
          <button class="art-opt sel" data-a="" onclick="setArt('',true)">–</button>
          <button class="art-opt" data-a="der" onclick="setArt('der',true)">der</button>
          <button class="art-opt" data-a="die" onclick="setArt('die',true)">die</button>
          <button class="art-opt" data-a="das" onclick="setArt('das',true)">das</button>
          <button class="art-opt auto" id="btn-auto" title="Artikel automatisch bestimmen" onclick="autoArticle(false)"><svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 2l1.8 6.2L20 10l-6.2 1.8L12 18l-1.8-6.2L4 10l6.2-1.8zM19 14.5l.9 2.6 2.6.9-2.6.9-.9 2.6-.9-2.6-2.6-.9 2.6-.9z"/></svg>Auto</button>
        </div>
      </div>
      <div class="field"><label>Wort *</label><input id="f-word" class="input" placeholder="Erfindung" onkeydown="enterSave(event)"></div>
      <div class="field"><label>Übersetzung *</label><input id="f-trans" class="input" placeholder="invention" onkeydown="enterSave(event)"></div>
      <div class="field"><label>Beispielsatz</label><input id="f-ex" class="input" placeholder="Die Pizza war eine geniale Erfindung." onkeydown="enterSave(event)"></div>
      <div class="field"><label>Notiz</label><input id="f-note" class="input" placeholder="von: erfinden" onkeydown="enterSave(event)"></div>
      <div class="field"><label>Thema</label><input id="f-topic" class="input" list="topics-dl" placeholder="Meine Wörter" onkeydown="enterSave(event)"><datalist id="topics-dl"></datalist></div>
      <button class="btn ai-fill" id="btn-fill" onclick="aiFill(false)"><svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 2l1.8 6.2L20 10l-6.2 1.8L12 18l-1.8-6.2L4 10l6.2-1.8zM19 14.5l.9 2.6 2.6.9-2.6.9-.9 2.6-.9-2.6-2.6-.9 2.6-.9z"/></svg>Mit KI ausfüllen</button>
      <div class="form-actions">
        <button class="btn knew" id="btn-save" onclick="saveWord()">Speichern</button>
        <button class="btn hidden" id="btn-cancel" onclick="resetForm();show('list')">Abbrechen</button>
      </div>
      <div class="hint">Nur das Wort eingeben + Enter → KI füllt Artikel, Übersetzung &amp; Beispiel aus</div>
    </div>
  </section>

  <div class="foot" id="foot"></div>
</div>

<div id="toast"></div>

<script>
const KEY='wortschatz-deck-v1';
const INTERVALS=[0,0,1,3,7,21];
const TRASH='<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 6h18M8 6V4h8v2M6 6l1 14h10l1-14"/></svg>';
const AUTO_LABEL='<svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 2l1.8 6.2L20 10l-6.2 1.8L12 18l-1.8-6.2L4 10l6.2-1.8zM19 14.5l.9 2.6 2.6.9-2.6.9-.9 2.6-.9-2.6-2.6-.9 2.6-.9z"/></svg>Auto';

let deck={words:[]};
let queue=[],qi=0,flipped=false,sessionKnew=0,sessionAgain=0;
let editingId=null,armedDelete=null,armTimer=null,selArt='',currentView='study';
let artTouched=false,saving=false;
let storageOK=true;

const $=id=>document.getElementById(id);
const esc=s=>String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

const store=(window.storage&&typeof window.storage.get==='function')?window.storage:(storageOK=false,{
  _m:{},
  async get(k){return (k in this._m)?{key:k,value:this._m[k]}:null;},
  async set(k,v){this._m[k]=v;return{key:k,value:v};}
});

function seedWords(){
  const now=Date.now();
  const mk=(art,de,en,ex,note,i)=>({id:'w'+(now-i),art,de,en,ex,note,topic:'Meine Wörter',box:1,due:0,created:now-i});
  return[
    mk('die','Weise','way, manner','Auf diese Weise lernt man schneller.','auf diese Weise = in this way',1),
    mk('','zubereiten','to prepare (food)','Ich bereite den Salat zu.','trennbar → ich bereite … zu',2),
    mk('der','Nachteil','disadvantage','Der einzige Nachteil ist der Preis.','Gegenteil: der Vorteil',3),
    mk('','danach','afterwards, after that','Zuerst kochen wir, danach essen wir.','',4),
    mk('die','Erfindung','invention','Die Pizza war eine geniale Erfindung.','von: erfinden (to invent)',5),
    mk('die','Armen','the poor (people)','Früher war das ein Essen für die Armen.','Plural · von: arm (poor)',6),
    mk('','enthalten','to contain','Cola enthält viel Zucker.','er/sie/es enthält · nicht trennbar',7),
    mk('','weltbekannt','world-famous','Döner ist heute weltbekannt.','Achtung: doppel-n',8),
    mk('','dünn','thin','Die Scheiben sind sehr dünn.','Gegenteil: dick',9)
  ];
}

function adjPack(){
  const now=Date.now();
  const mk=(de,en,ex,note,i)=>({id:'adj'+i,art:'',de,en,ex,note,topic:'Adjektive',box:1,due:0,created:now});
  return[
    mk('groß','big, tall','Hamburg ist eine große Stadt.','Gegenteil: klein',1),
    mk('klein','small','Wir haben eine kleine Küche.','Gegenteil: groß',2),
    mk('gut','good','Das ist eine gute Idee.','Gegenteil: schlecht',3),
    mk('schlecht','bad','Das Wetter ist heute schlecht.','Gegenteil: gut',4),
    mk('schön','beautiful, nice','Ich wünsche dir einen schönen Tag.','',5),
    mk('neu','new','Er kauft sich ein neues Handy.','Gegenteil: alt',6),
    mk('alt','old','Mein Auto ist ziemlich alt.','Gegenteil: neu / jung',7),
    mk('teuer','expensive','Diese Schuhe sind mir zu teuer.','Gegenteil: billig · dekliniert: teur- (ein teures Auto)',8),
    mk('billig','cheap','Der Rock war ziemlich billig.','Gegenteil: teuer',9),
    mk('schnell','fast','Du lernst wirklich schnell.','Gegenteil: langsam',10),
    mk('langsam','slow','Sprich bitte langsamer!','Gegenteil: schnell',11),
    mk('einfach','easy, simple','Die Aufgabe ist ganz einfach.','Gegenteil: schwierig',12),
    mk('schwierig','difficult','Deutsche Artikel sind manchmal schwierig.','Gegenteil: einfach',13),
    mk('wichtig','important','Das ist ein wichtiger Termin.','',14),
    mk('müde','tired','Nach der Arbeit bin ich müde.','',15),
    mk('lecker','tasty','Der Döner hier ist richtig lecker.','',16)
  ];
}

function prepPack(){
  const now=Date.now();
  const mk=(de,en,ex,note,i)=>({id:'prep'+i,art:'',de,en,ex,note,topic:'Präpositionen',box:1,due:0,created:now});
  return[
    mk('mit','with','Ich fahre mit dem Bus.','immer + Dativ',1),
    mk('für','for','Das Geschenk ist für dich.','immer + Akkusativ',2),
    mk('ohne','without','Ich trinke Kaffee ohne Zucker.','immer + Akkusativ',3),
    mk('bei','at, with (someone)','Sie wohnt bei ihren Eltern.','immer + Dativ',4),
    mk('nach','after; to (cities)','Nach dem Essen gehen wir spazieren.','immer + Dativ',5),
    mk('von','from, of','Das ist ein Geschenk von meiner Oma.','immer + Dativ',6),
    mk('zu','to (people, places)','Ich gehe heute zu meiner Schwester.','immer + Dativ',7),
    mk('aus','from, out of','Er kommt aus der Türkei.','immer + Dativ',8),
    mk('in','in, into','Ich bin in der Küche.','Wechsel: wo? + Dativ · wohin? + Akkusativ',9),
    mk('auf','on, onto','Der Vogel sitzt auf dem Baum.','Wechsel: wo? + Dativ · wohin? + Akkusativ',10),
    mk('an','at, on (vertical)','Das Bild hängt an der Wand.','Wechsel: wo? + Dativ · wohin? + Akkusativ',11),
    mk('über','about; above','Wir sprechen über den Film.','über + Thema: + Akkusativ',12),
    mk('seit','since, for (time)','Ich lerne seit einem Jahr Deutsch.','immer + Dativ',13),
    mk('gegen','against','Wir spielen gegen euch.','immer + Akkusativ',14)
  ];
}

function floskelnPack(){
  const now=Date.now();
  const mk=(de,en,note,i)=>({id:'phr'+i,art:'',de,en,ex:'',note,topic:'Sätze & Floskeln',box:1,due:0,created:now});
  return[
    // Kapitel 01 — Grüßen & Verabschieden
    mk('Moin!','hi / hello — any time of day','Norddeutsch · the northern universal',1),
    mk('Moin Moin!','hi there!','Norddeutsch · doubling it is already chatty',2),
    mk('Hallo!','hello','',3),
    mk('Guten Morgen! / Morgen!','good morning / morning','',4),
    mk('Guten Tag!','good day, hello','formal — strangers, officials',5),
    mk('Guten Abend!','good evening','',6),
    mk('Grüß dich!','hi! (someone you know)','informal',7),
    mk('Na?','hey — how are you — what’s up','a whole greeting in one word',8),
    mk('Wie geht’s dir?','how are you? (informal)','formal: Wie geht es Ihnen?',9),
    mk('Und selbst? / Und dir?','and you?','',10),
    mk('Schön, dich zu sehen!','good to see you!','',11),
    mk('Lange nicht gesehen!','long time no see!','',12),
    mk('Tschüss! / Tschüssi!','bye!','',13),
    mk('Bis dann! / Bis später!','see you then / later','',14),
    mk('Bis bald!','see you soon','',15),
    mk('Bis morgen!','see you tomorrow','',16),
    mk('Wir sehen uns!','see you around','',17),
    mk('Auf Wiedersehen!','goodbye','formal — in person',18),
    mk('Auf Wiederhören!','goodbye','on the phone only!',19),
    mk('Schönen Tag noch!','have a nice day!','hören · the classic shop goodbye',20),
    mk('Schönes Wochenende!','have a good weekend!','',21),
    mk('Mach’s gut! — Mach du auch!','take care! — you too!','',22),
    mk('Komm gut nach Hause!','get home safe!','',23),
    // Kapitel 02 — Höflichkeit
    mk('Bitte.','please · here you go · you’re welcome','one word, three jobs',24),
    mk('Bitte schön!','here you are / you’re welcome','hören · when handing something over',25),
    mk('Danke schön! / Vielen Dank!','thank you very much!','',26),
    mk('Tausend Dank!','thanks a million!','sagen',27),
    mk('Gern geschehen. / Gerne!','you’re welcome / my pleasure','hören',28),
    mk('Kein Problem. / Kein Ding.','no problem','Kein Ding = casual',29),
    mk('Nichts zu danken.','don’t mention it','',30),
    mk('Da nich für!','you’re welcome!','hören · Norddeutsch · the northern answer to thanks',31),
    mk('Entschuldigung!','excuse me / sorry','gets attention AND apologizes',32),
    mk('’Tschuldigung!','sorry!','the casual short form',33),

function migrate(){
  let changed=false;
  deck.words.forEach(w=>{if(!w.topic){w.topic='Meine Wörter';changed=true;}});
  if(!deck.packs){deck.packs=[];changed=true;}
  if(!deck.inactive){deck.inactive=[];changed=true;}
  if(deck.packs.indexOf('adjektive')<0){deck.words=deck.words.concat(adjPack());deck.packs.push('adjektive');changed=true;}
  if(deck.packs.indexOf('praepositionen')<0){deck.words=deck.words.concat(prepPack());deck.packs.push('praepositionen');changed=true;}
  if(deck.packs.indexOf('floskeln')<0){deck.words=deck.words.concat(floskelnPack());deck.packs.push('floskeln');changed=true;}
  return changed;
}

let TOPICS=[];
function allTopics(){
  const s=[];
  deck.words.forEach(w=>{const t=w.topic||'Meine Wörter';if(s.indexOf(t)<0)s.push(t);});
  return s;
}
function topicActive(t){return (deck.inactive||[]).indexOf(t)<0;}
function toggleTopic(i){
  const t=TOPICS[i];if(t===undefined)return;
  deck.inactive=deck.inactive||[];
  const x=deck.inactive.indexOf(t);
  if(x>=0)deck.inactive.splice(x,1);else deck.inactive.push(t);
  saveDeck();renderTopics();startSession();
}
function renderTopics(){
  TOPICS=allTopics();
  $('topic-chips').innerHTML=TOPICS.map((t,i)=>{
    const on=topicActive(t);
    const n=deck.words.filter(w=>(w.topic||'Meine Wörter')===t).length;
    const tick=on
      ?'<span class="tick"><svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"><path d="M4 13l5 5L20 7"/></svg></span>'
      :'<span class="tick"></span>';
    return '<button class="tchip'+(on?' on':'')+'" onclick="toggleTopic('+i+')">'+tick+esc(t)+'<span class="tc">'+n+'</span></button>';
  }).join('');
  $('topics-dl').innerHTML=TOPICS.map(t=>'<option value="'+esc(t)+'">').join('');
}

function shuffle(a){
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

function startSession(all){
  const now=Date.now();
  const pool=deck.words.filter(w=>topicActive(w.topic||'Meine Wörter')&&(all||(w.due||0)<=now));
  queue=shuffle(pool.map(w=>w.id));
  qi=0;flipped=false;sessionKnew=0;sessionAgain=0;
  renderStudy();
}

function nextDueText(){
  const now=Date.now();
  const fut=deck.words.filter(w=>topicActive(w.topic||'Meine Wörter')).map(w=>w.due||0).filter(d=>d>now);
  if(!fut.length)return'';
  const days=Math.ceil((Math.min.apply(null,fut)-now)/864e5);
  return days<=1?'Nächste Wiederholung: morgen.':'Nächste Wiederholung: in '+days+' Tagen.';
}

function renderStudy(){
  updateStats();
  const stage=$('stage'),acts=$('study-actions'),prog=$('study-progress');
  while(qi<queue.length&&!deck.words.find(w=>w.id===queue[qi]))qi++;

  if(deck.words.length===0){
    prog.style.visibility='hidden';acts.innerHTML='';
    stage.innerHTML=stateBox('Noch keine Wörter','Füg dein erstes Wort hinzu und leg los.','+ Neues Wort','goAdd()');
    return;
  }
  if(queue.length===0){
    prog.style.visibility='hidden';acts.innerHTML='';
    const activePool=deck.words.filter(w=>topicActive(w.topic||'Meine Wörter'));
    if(activePool.length===0){
      stage.innerHTML=stateBox('Kein Thema aktiv','Tippe oben ein Thema an, um zu lernen.','','');
    }else{
      stage.innerHTML=stateBox('Nichts fällig','Alle Karten sind für heute gelernt. '+nextDueText(),'Trotzdem alle üben','startSession(true)');
    }
    return;
  }
  if(qi>=queue.length){
    prog.style.visibility='hidden';acts.innerHTML='';
    stage.innerHTML=doneBox();
    return;
  }
  prog.style.visibility='visible';
  $('study-bar').style.width=Math.round(qi/queue.length*100)+'%';
  const w=deck.words.find(x=>x.id===queue[qi]);
  stage.innerHTML=cardHtml(w);
  renderActions();
}

function renderActions(){
  const acts=$('study-actions');
  if(deck.words.length===0||queue.length===0||qi>=queue.length){acts.innerHTML='';return;}
  acts.innerHTML=flipped
    ?'<div class="grade"><button class="btn again" onclick="gradeCard(false)">Nochmal</button><button class="btn knew" onclick="gradeCard(true)">Gewusst</button></div>'
    :'<button class="btn ghost" onclick="flipCard()">Antwort zeigen</button>';
}

function flipCard(){
  if(qi>=queue.length)return;
  flipped=!flipped;
  const c=document.querySelector('.card');
  if(c)c.classList.toggle('flipped',flipped);
  renderActions();
}

function gradeCard(knew){
  const w=deck.words.find(x=>x.id===queue[qi]);
  if(!w)return;
  if(knew){w.box=Math.min(5,(w.box||1)+1);sessionKnew++;}
  else{w.box=1;sessionAgain++;queue.push(w.id);}
  const days=INTERVALS[w.box];
  w.due=days?Date.now()+days*864e5:0;
  qi++;flipped=false;
  saveDeck();
  renderStudy();
}

function delWord(id){
  if(armedDelete!==id){
    armedDelete=id;renderList();
    clearTimeout(armTimer);
    armTimer=setTimeout(()=>{if(armedDelete===id){armedDelete=null;renderList();}},2500);
    return;
  }
  deck.words=deck.words.filter(w=>w.id!==id);
  queue=queue.filter(x=>x!==id);
  if(qi>queue.length)qi=queue.length;
  armedDelete=null;
  saveDeck();updateStats();renderList();renderTopics();
  toast('Gelöscht');
}

const SUFFIX=[['schaft','die'],['ismus','der'],['heit','die'],['keit','die'],['ment','das'],['chen','das'],['lein','das'],['ling','der'],['ung','die'],['ion','die'],['tät','die'],['enz','die'],['anz','die'],['ant','der'],['ent','der'],['ist','der'],['eur','der'],['tum','das'],['nis','das'],['ik','die'],['ei','die'],['ie','die'],['ur','die'],['or','der'],['um','das'],['ma','das'],['ich','der'],['ig','der'],['e','die']];
function guessArticle(w){
  const s=w.toLowerCase();
  for(const r of SUFFIX){if(s.length>r[0].length&&s.endsWith(r[0]))return{art:r[1],suf:r[0]};}
  return null;
}
async function aiArticle(word){
  const res=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      model:'claude-sonnet-4-6',
      max_tokens:1000,
      messages:[{role:'user',content:'Welcher Artikel gehört zum deutschen Wort "'+word+'"? Antworte mit genau einem Wort: der, die, das oder kein (falls es kein Nomen ist).'}]
    })
  });
  if(!res.ok)throw new Error('api');
  const data=await res.json();
  const txt=(data.content||[]).map(c=>c.type==='text'?c.text:'').join(' ').toLowerCase();
  const m=txt.match(/\b(der|die|das|kein)\b/);
  if(!m)throw new Error('parse');
  return m[1];
}
async function autoArticle(silent){
  const input=$('f-word');
  const word=input.value.trim();
  if(!word){if(!silent)toast('Erst ein Wort eingeben');return null;}
  const btn=$('btn-auto');
  btn.disabled=true;btn.innerHTML='…';
  let art=null,guessed=false,suf='';
  try{art=await aiArticle(word);}
  catch(e){const g=guessArticle(word);if(g){art=g.art;guessed=true;suf=g.suf;}}
  btn.disabled=false;btn.innerHTML=AUTO_LABEL;
  if(art===null){toast('Artikel nicht erkannt – bitte selbst wählen');return null;}
  if(art==='kein'){setArt('',true);if(!silent)toast('Kein Artikel – kein Nomen');return'';}
  setArt(art,true);
  input.value=word.charAt(0).toUpperCase()+word.slice(1);
  toast('Artikel: '+art+(guessed?' (geraten, Endung -'+suf+')':''));
  return art;
}
async function aiFill(fromSave){
  const wIn=$('f-word');
  const word=wIn.value.trim();
  if(!word){if(!fromSave)toast('Erst ein Wort eingeben');return false;}
  const btn=$('btn-fill');
  const old=btn.innerHTML;
  btn.disabled=true;btn.innerHTML='KI denkt …';
  let ok=false;
  try{
    const givenTrans=$('f-trans').value.trim();
    const prompt='Du hilfst einem Deutschlerner (Niveau A2). Wort: "'+word+'".'+(givenTrans?' Die englische Übersetzung ist: "'+givenTrans+'".':'')+' Antworte NUR mit einem JSON-Objekt ohne Markdown, ohne Erklärung: {"wort":"das Wort in korrekter deutscher Schreibweise, ohne Artikel","artikel":"der|die|das|kein","uebersetzung":"kurze englische Übersetzung","beispiel":"ein einfacher deutscher Beispielsatz (A2-Niveau)","notiz":"sehr kurzer Grammatik-Hinweis auf Deutsch (z.B. Gegenteil, Kasus, trennbar, Plural) oder leerer String"}';
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1000,messages:[{role:'user',content:prompt}]})
    });
    if(!res.ok)throw new Error('api');
    const data=await res.json();
    const txt=(data.content||[]).map(c=>c.type==='text'?c.text:'').join('').replace(/```json|```/g,'').trim();
    const j=JSON.parse(txt);
    if(j.wort&&typeof j.wort==='string')wIn.value=j.wort.trim();
    if(!artTouched){
      if(j.artikel==='der'||j.artikel==='die'||j.artikel==='das')setArt(j.artikel,true);
      else if(j.artikel==='kein')setArt('',true);
    }
    if(!$('f-trans').value.trim()&&j.uebersetzung)$('f-trans').value=String(j.uebersetzung).trim();
    if(!$('f-ex').value.trim()&&j.beispiel)$('f-ex').value=String(j.beispiel).trim();
    if(!$('f-note').value.trim()&&j.notiz)$('f-note').value=String(j.notiz).trim();
    ok=true;
    if(!fromSave)toast('Ausgefüllt – prüfen und speichern');
  }catch(e){
    const g=guessArticle(word);
    if(g&&!artTouched)setArt(g.art,true);
    if(!fromSave)toast('KI nicht erreichbar');
  }
  btn.disabled=false;btn.innerHTML=old;
  return ok;
}

async function saveWord(){
  if(saving)return;
  let de=$('f-word').value.trim();
  if(!de){toast('Erst ein Wort eingeben');return;}
  saving=true;
  if(!editingId&&(!$('f-trans').value.trim()||!artTouched)){
    $('btn-save').textContent='KI füllt aus …';
    await aiFill(true);
    de=$('f-word').value.trim();
  }
  const en=$('f-trans').value.trim();
  if(!en){
    toast('Übersetzung fehlt – bitte ergänzen');
    $('btn-save').textContent=editingId?'Aktualisieren':'Speichern';
    saving=false;return;
  }
  const ex=$('f-ex').value.trim(),note=$('f-note').value.trim();
  const topic=$('f-topic').value.trim()||'Meine Wörter';
  if(editingId){
    const w=deck.words.find(x=>x.id===editingId);
    if(w)Object.assign(w,{de,en,ex,note,topic,art:selArt});
    saveDeck();updateStats();renderTopics();
    toast('Aktualisiert');
    resetForm();show('list');
  }else{
    const nw={id:'w'+Date.now().toString(36)+Math.random().toString(36).slice(2,5),de,en,ex,note,topic,art:selArt,box:1,due:0,created:Date.now()};
    deck.words.unshift(nw);
    if(topicActive(topic))queue.push(nw.id);
    saveDeck();updateStats();renderTopics();
    toast(selArt?('Gespeichert: '+selArt+' '+de):'Gespeichert – nächstes Wort?');
    resetForm();$('f-word').focus();
  }
  saving=false;
}

let toastT=null;
function toast(m){
  const t=$('toast');
  t.textContent=m;t.classList.add('show');
  clearTimeout(toastT);
  toastT=setTimeout(()=>t.classList.remove('show'),1800);
}

document.addEventListener('keydown',e=>{
  if(currentView!=='study')return;
  const tag=document.activeElement&&document.activeElement.tagName;
  if(tag==='INPUT'||tag==='TEXTAREA')return;
  if(e.code==='Space'){e.preventDefault();flipCard();}
  else if(flipped&&(e.key==='ArrowLeft'||e.key==='1'))gradeCard(false);
  else if(flipped&&(e.key==='ArrowRight'||e.key==='2'))gradeCard(true);
});

(async function init(){
  const loaded=await loadDeck();
  if(loaded&&Array.isArray(loaded.words)&&loaded.words.length)deck=loaded;
  else deck={words:seedWords()};
  if(migrate())saveDeck();
  if(!storageOK)$('foot').textContent='Hinweis: Kein dauerhafter Speicher verfügbar – Änderungen gelten nur für diese Sitzung.';
  renderTopics();
  updateStats();
  startSession();
  show('study');
})();
</script>
